services:
  postgres:
    image: postgres:16-alpine
    container_name: equismile-postgres
    restart: unless-stopped
    user: postgres
    ports:
      - '5433:5432'
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-equismile}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?}
      POSTGRES_DB: ${POSTGRES_DB:-equismile}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init-databases.sh:/docker-entrypoint-initdb.d/init-databases.sh
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U equismile']
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
    # Cap Docker-managed log file growth so a crash loop can't fill the
    # disk on the VPS. 10MB × 5 files = 50MB ceiling per service.
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    stop_grace_period: 30s

  migrator:
    build:
      context: .
      target: migrator
    container_name: equismile-migrator
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-equismile}:${POSTGRES_PASSWORD:?}@postgres:5432/${POSTGRES_DB:-equismile}
      DEMO_MODE: ${DEMO_MODE:-false}
    depends_on:
      postgres:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    restart: "no"

  app:
    build:
      context: .
      args:
        # NEXT_PUBLIC_* variables are inlined into the client bundle at
        # build time, so the Maps browser key must be available here —
        # setting it only at runtime leaves the map blank in prod.
        NEXT_PUBLIC_GOOGLE_MAPS_BROWSER_KEY: ${NEXT_PUBLIC_GOOGLE_MAPS_BROWSER_KEY:-}
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
        NEXT_PUBLIC_DEFAULT_LOCALE: ${NEXT_PUBLIC_DEFAULT_LOCALE:-en}
    container_name: equismile-app
    restart: unless-stopped
    expose:
      - '3000'
    environment:
      # --- Core ---------------------------------------------------------
      DATABASE_URL: postgresql://${POSTGRES_USER:-equismile}:${POSTGRES_PASSWORD:?}@postgres:5432/${POSTGRES_DB:-equismile}
      DEMO_MODE: ${DEMO_MODE:-false}
      NODE_ENV: production
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      NEXT_PUBLIC_DEFAULT_LOCALE: ${NEXT_PUBLIC_DEFAULT_LOCALE:-en}
      NEXT_PUBLIC_GOOGLE_MAPS_BROWSER_KEY: ${NEXT_PUBLIC_GOOGLE_MAPS_BROWSER_KEY:-}
      # --- Auth.js (Phase 15 fix — was missing in Docker) --------------
      # Without these the login page fails closed in production.
      AUTH_SECRET: ${AUTH_SECRET:-}
      AUTH_URL: ${AUTH_URL:-}
      AUTH_GITHUB_ID: ${AUTH_GITHUB_ID:-}
      AUTH_GITHUB_SECRET: ${AUTH_GITHUB_SECRET:-}
      AUTH_EMAIL_ENABLED: ${AUTH_EMAIL_ENABLED:-false}
      ALLOWED_GITHUB_LOGINS: ${ALLOWED_GITHUB_LOGINS:-}
      # --- n8n ----------------------------------------------------------
      N8N_API_KEY: ${N8N_API_KEY:-}
      N8N_WEBHOOK_URL: ${N8N_WEBHOOK_URL:-http://n8n:5678}
      N8N_HOST: n8n
      N8N_PORT: '5678'
      N8N_PROTOCOL: http
      # --- WhatsApp -----------------------------------------------------
      WHATSAPP_PHONE_NUMBER_ID: ${WHATSAPP_PHONE_NUMBER_ID:-}
      WHATSAPP_BUSINESS_ACCOUNT_ID: ${WHATSAPP_BUSINESS_ACCOUNT_ID:-}
      WHATSAPP_ACCESS_TOKEN: ${WHATSAPP_ACCESS_TOKEN:-}
      WHATSAPP_API_TOKEN: ${WHATSAPP_API_TOKEN:-}
      WHATSAPP_VERIFY_TOKEN: ${WHATSAPP_VERIFY_TOKEN:-}
      WHATSAPP_APP_SECRET: ${WHATSAPP_APP_SECRET:-}
      # --- Email / SMTP -------------------------------------------------
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-}
      # --- Google Maps (server) -----------------------------------------
      GOOGLE_MAPS_API_KEY: ${GOOGLE_MAPS_API_KEY:-}
      GCP_PROJECT_ID: ${GCP_PROJECT_ID:-}
      HOME_BASE_ADDRESS: ${HOME_BASE_ADDRESS:-}
      HOME_BASE_LAT: ${HOME_BASE_LAT:-}
      HOME_BASE_LNG: ${HOME_BASE_LNG:-}
      # --- Clinical AI / vision (Phase 13) ------------------------------
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      EQUISMILE_VISION_MODEL: ${EQUISMILE_VISION_MODEL:-}
      # --- Clinical attachments -----------------------------------------
      # Must match the volume mount below so uploads survive container
      # restarts.
      ATTACHMENT_STORAGE_DIR: /app/data/attachments
    volumes:
      # Phase 15 — persistent storage for uploaded horse attachments.
      # Without this, the filesystem under /app is ephemeral and every
      # container restart wipes uploaded PDFs / clinical images.
      - attachments_data:/app/data/attachments
    depends_on:
      migrator:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://localhost:3000/api/health']
      interval: 10s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    stop_grace_period: 30s

  n8n:
    image: n8nio/n8n:latest
    container_name: equismile-n8n
    restart: unless-stopped
    ports:
      - '${N8N_PORT:-5678}:5678'
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: n8n
      DB_POSTGRESDB_USER: ${POSTGRES_USER:-equismile}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD:?}
      N8N_BASIC_AUTH_ACTIVE: ${N8N_BASIC_AUTH_ACTIVE:-true}
      N8N_BASIC_AUTH_USER: ${N8N_BASIC_AUTH_USER:-admin}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_BASIC_AUTH_PASSWORD:-changeme}
      N8N_PROTOCOL: ${N8N_PROTOCOL:-http}
      N8N_HOST: ${N8N_HOST:-localhost}
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget --no-verbose --tries=1 --spider http://localhost:5678/healthz || exit 1']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    stop_grace_period: 30s

  caddy:
    image: caddy:2-alpine
    container_name: equismile-caddy
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    environment:
      DOMAIN: ${DOMAIN:-localhost}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app
      - n8n
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

volumes:
  postgres_data:
  n8n_data:
  caddy_data:
  caddy_config:
  attachments_data:
