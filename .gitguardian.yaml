version: 2

# GitGuardian scanner configuration.
#
# The `generic_password*` detectors flag `postgresql://user:${password}@host`
# patterns inside `docker-compose.yml` even when the "password" is a pure
# Docker Compose env-var reference with no literal credential. Examples:
# `${POSTGRES_PASSWORD:?}` — compose substitutes the value from the
# operator's ungitted `.env` at startup, and the `:?` suffix makes compose
# refuse to start if the variable is unset. The string is therefore not
# a secret but a declarative "this variable is required at boot".
#
# We whitelist the specific literal so the scanner still protects us from
# any actual secret accidentally pasted into the file.

secret:
  ignored-matches:
    - name: "docker-compose POSTGRES_PASSWORD env-var reference (false-positive)"
      match: ${POSTGRES_PASSWORD:?}
